<script>
const LIFF_ID = '2009812734-KondoBJ0';

const PRODUCTS=[
  {id:'P001',name:'เสื้อยืด Basic',price:299,emoji:'👕',stock:50},
  {id:'P002',name:'กางเกงยีนส์',price:899,emoji:'👖',stock:20},
  {id:'P003',name:'รองเท้าผ้าใบ',price:1290,emoji:'👟',stock:15},
  {id:'P004',name:'กระเป๋าสะพาย',price:590,emoji:'👜',stock:30},
  {id:'P005',name:'หมวกแก็ป',price:250,emoji:'🧢',stock:40},
  {id:'P006',name:'แว่นกันแดด',price:450,emoji:'🕶️',stock:25}
];

let cart={};
let lineUser={userId:null,displayName:'ไม่ทราบชื่อ',pictureUrl:null};

// ✅ ใส่ URL เรียบร้อย
let scriptUrl = 'https://script.google.com/macros/s/AKfycbwTXaJUToMbgmxfmXZliZ6Jt5q5wDezIKigUhc-ShawJcbvzhGMocMt0IDfm_wxovor/exec';

// LIFF Init
async function initLiff(){
  const pillEl=document.getElementById('user-pill');
  try{
    await liff.init({liffId:LIFF_ID});
    if(!liff.isLoggedIn()){
      liff.login();return;
    }
    const profile=await liff.getProfile();
    lineUser={
      userId:profile.userId,
      displayName:profile.displayName,
      pictureUrl:profile.pictureUrl||null
    };

    pillEl.innerHTML=`
      ${lineUser.pictureUrl?`<img src="${lineUser.pictureUrl}" class="user-avatar">`:'👤'}
      <span class="user-name-small">${lineUser.displayName}</span>`;
  }catch(err){
    lineUser={
      userId:'DEMO',
      displayName:'Demo Mode',
      pictureUrl:null
    };
    pillEl.innerHTML=`👤 Demo Mode`;
  }
}

function renderProducts(){
  document.getElementById('grid').innerHTML=PRODUCTS.map(p=>`
    <div class="product-card">
      <div class="product-img">${p.emoji}</div>
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-price">฿${p.price}</div>
        <button class="btn-add" onclick="addCart('${p.id}')">+ ใส่ตะกร้า</button>
      </div>
    </div>`).join('');
}

function addCart(id){
  cart[id]=(cart[id]||0)+1;
  updateCart();
}

function updateCart(){
  const total=Object.entries(cart).reduce((s,[id,q])=>{
    const p=PRODUCTS.find(x=>x.id===id);
    return s+(p?p.price*q:0);
  },0);

  document.getElementById('cart-summary').textContent='มีสินค้าในตะกร้า';
  document.getElementById('cart-total').textContent='฿'+total;
  document.getElementById('btn-order').disabled=false;
}

async function submitOrder(){
  const items=Object.entries(cart);
  if(items.length===0){alert('ไม่มีสินค้า');return;}

  const total=items.reduce((s,[id,q])=>{
    const p=PRODUCTS.find(x=>x.id===id);
    return s+p.price*q;
  },0);

  const payload={
    orderId:'ORD-'+Date.now(),
    lineUserId:lineUser.userId,
    lineDisplayName:lineUser.displayName,
    name:'ลูกค้า',
    phone:'000',
    address:'-',
    note:'',
    items:items.map(([id,q])=>{
      const p=PRODUCTS.find(x=>x.id===id);
      return {id,name:p.name,qty:q,price:p.price,subtotal:p.price*q};
    }),
    total,
    timestamp:new Date().toISOString()
  };

  try{
    await fetch(scriptUrl,{
      method:'POST',
      body:JSON.stringify(payload),
      headers:{'Content-Type':'application/json'}
    });

    alert('สั่งซื้อสำเร็จ');
    cart={};
    updateCart();

  }catch(e){
    alert('ส่งข้อมูลไม่สำเร็จ');
    console.log(e);
  }
}

renderProducts();
initLiff();
</script>
