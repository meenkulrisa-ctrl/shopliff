<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopEasy</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{font-family:sans-serif;background:#f4f6f9;margin:0;padding:16px}
#userBadge{position:fixed;top:10px;right:10px;background:#000;color:#fff;padding:6px 12px;border-radius:20px;font-size:12px}
.header{font-size:22px;font-weight:bold;margin-bottom:12px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:#fff;padding:12px;border-radius:12px}
.card img{width:100%;border-radius:10px}
.price{color:#27ae60}
button{width:100%;padding:8px;margin-top:8px;background:#2ecc71;color:#fff;border:none;border-radius:8px}
.cart{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:12px}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);justify-content:center;align-items:center}
.modal-content{background:#fff;padding:20px;border-radius:12px;width:90%}
</style>
</head>

<body>

<div id="userBadge">⏳ กำลังโหลด</div>
<div class="header">🛒 ShopEasy</div>
<div class="grid" id="productList"></div>

<div class="cart">
🧺 <span id="cartCount">0</span>
<button onclick="openModal()">สั่งซื้อ</button>
</div>

<!-- FORM -->
<div id="orderModal" class="modal">
<div class="modal-content">
<input id="name" placeholder="ชื่อ"><br>
<input id="phone" placeholder="เบอร์"><br>
<input id="email" placeholder="อีเมล"><br>
<textarea id="address" placeholder="ที่อยู่"></textarea><br>
<textarea id="note" placeholder="หมายเหตุ"></textarea>
<button onclick="confirmOrder()">ยืนยัน</button>
</div>
</div>

<!-- QR -->
<div id="paymentModal" class="modal">
<div class="modal-content">
<img id="qrImg" width="200"><br>
<input type="file" id="slipFile"><br>
<button onclick="submitSlip()">ส่งสลิป</button>
</div>
</div>

<script>
const LIFF_ID="2009816303-JA70bVo1";
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbzI8CsNjFP6KF9NggBN7KXo4IrHDXha-ewTDS7k-IKjQaI9ueFwXXNasnWl36P736kE/exec";

let lineUser=null;
let cart=[];
let currentOrder=null;

/* ===== LIFF ===== */
async function initLiff(){
  const badge=document.getElementById("userBadge");

  try{
    await liff.init({liffId:LIFF_ID});

    if(!liff.isLoggedIn()){
      liff.login({redirectUri:location.href});
      return;
    }

    const profile=await liff.getProfile();
    const token=liff.getDecodedIDToken();

    lineUser={
      userId:token.sub,
      displayName:profile.displayName
    };

    badge.innerHTML="👤 "+lineUser.displayName;

  }catch(err){
    console.error(err);

    // 🔥 fallback กันพัง
    lineUser={
      userId:"DEMO-"+Date.now(),
      displayName:"Demo User"
    };

    badge.innerHTML="⚠️ Demo Mode";
  }
}

/* ===== PRODUCTS ===== */
const products=[
{id:"P001",name:"ชาไทย",price:40,img:"https://picsum.photos/200"},
{id:"P002",name:"กาแฟ",price:50,img:"https://picsum.photos/201"}
];

function renderProducts(){
  productList.innerHTML=products.map(p=>`
  <div class="card">
    <img src="${p.img}">
    <div>${p.name}</div>
    <div class="price">฿${p.price}</div>
    <button onclick="add('${p.id}')">เพิ่ม</button>
  </div>`).join("");
}

/* ===== CART ===== */
function add(id){
  const p=products.find(x=>x.id===id);
  const f=cart.find(x=>x.id===id);
  if(f)f.qty++;else cart.push({...p,qty:1});
  cartCount.innerText=cart.reduce((s,i)=>s+i.qty,0);
}

function openModal(){
  orderModal.style.display="flex";
}

/* ===== CONFIRM ===== */
function confirmOrder(){
  const total=cart.reduce((s,i)=>s+(i.price*i.qty),0);

  currentOrder={
    orderId:"ORD-"+Date.now(),
    name:name.value,
    phone:phone.value,
    email:email.value,
    address:address.value,
    note:note.value,
    total,
    items:cart
  };

  orderModal.style.display="none";
  paymentModal.style.display="flex";
  qrImg.src=`https://promptpay.io/0812345678/${total}`;
}

/* ===== UPLOAD ===== */
function submitSlip(){
  const file=slipFile.files[0];
  if(!file)return alert("แนบสลิป");

  const reader=new FileReader();

  reader.onload=async ()=>{
    const base64=reader.result.split(",")[1];

    const payload={
      ...currentOrder,
      lineUserId:lineUser.userId,
      lineDisplayName:lineUser.displayName,
      items:JSON.stringify(currentOrder.items),
      slip:base64,
      status:"pending"
    };

    const res=await fetch(SCRIPT_URL,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify(payload)
    });

    const data=await res.json();

    if(data.status==="success"){
      alert("✅ สำเร็จ");
      location.reload();
    }else{
      alert("❌ error");
    }
  };

  reader.readAsDataURL(file);
}

/* ===== START ===== */
window.onload=()=>{
  renderProducts();
  initLiff();
};
</script>

</body>
</html>
