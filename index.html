<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ShopEasy - Production</title>

<!-- ✅ โหลด LIFF -->
<script src="https://cdn.jsdelivr.net/npm/@line/liff@2.22.3/dist/liff.min.js" defer></script>

<style>
body{font-family:sans-serif;background:#f7f9f7;padding:16px}
.card{background:#fff;padding:16px;border-radius:12px;margin-bottom:12px}
</style>
</head>
<body>

<div class="card">
  <h2>🛒 ShopEasy</h2>
  <div id="user">กำลังโหลด...</div>
  <div id="status">⏳ กำลังตรวจสอบ LIFF...</div>
</div>

<div class="card">
  <button onclick="addCart()">+ เพิ่มสินค้า</button>
  <div id="cart">ยังไม่มีสินค้า</div>
</div>

<div class="card">
  <button onclick="submitOrder()">สั่งซื้อ</button>
</div>

<script>
/* ================= CONFIG ================= */
const LIFF_ID = "2009816303-JA70bVo1";
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw7wzSjgmWLxaTuBm1-4t10sYiw4-jq4yzAaetk_oO04BHE9tCbGdyOSfm1S_PIGxi6/exec";

/* ================= STATE ================= */
let cart = 0;
let lineUser = null;

/* ================= SAFE LIFF LOADER ================= */
async function waitForLiff(maxRetry = 20) {
  let retry = 0;

  while (typeof liff === "undefined" && retry < maxRetry) {
    console.log("⏳ waiting liff...");
    await new Promise(r => setTimeout(r, 300));
    retry++;
  }

  if (typeof liff === "undefined") {
    throw new Error("LIFF failed to load");
  }
}

/* ================= LIFF INIT ================= */
async function initLiffSafe() {
  const userEl = document.getElementById("user");
  const statusEl = document.getElementById("status");

  try {
    await waitForLiff();

    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    const profile = await liff.getProfile();

    lineUser = profile;

    userEl.innerHTML = "👤 " + profile.displayName;
    statusEl.innerHTML = "✅ พร้อมใช้งาน";

    console.log("✅ LIFF READY", profile);

  } catch (err) {
    console.error("LIFF FAIL:", err);

    // ✅ fallback (สำคัญมาก)
    lineUser = {
      userId: "DEMO-" + Date.now(),
      displayName: "Demo User"
    };

    userEl.innerHTML = "👤 Demo User";
    statusEl.innerHTML = "⚠️ Demo Mode";
  }
}

/* ================= CART ================= */
function addCart() {
  cart++;
  document.getElementById("cart").innerHTML = `สินค้า ${cart} ชิ้น`;
}

/* ================= ORDER ================= */
async function submitOrder() {
  if (!lineUser) {
    alert("ระบบยังไม่พร้อม");
    return;
  }

  const payload = {
    orderId: "ORD-" + Date.now(),
    lineUserId: lineUser.userId,
    lineDisplayName: lineUser.displayName,
    total: cart,
    timestamp: new Date().toISOString()
  };

  try {
    const query = new URLSearchParams(payload).toString();

    const res = await fetch(`${SCRIPT_URL}?${query}`);

    const data = await res.json();

    console.log("ORDER RESULT:", data);

    if (data.status === "success") {
      alert("✅ สั่งซื้อสำเร็จ");
      cart = 0;
      document.getElementById("cart").innerHTML = "ยังไม่มีสินค้า";
    } else {
      throw new Error(data.message);
    }

  } catch (err) {
    console.error("ORDER ERROR:", err);
    alert("❌ เกิดข้อผิดพลาด: " + err.message);
  }
}

/* ================= START ================= */
window.addEventListener('load', async () => {
  renderProducts();

  // รอให้ liff โหลดจริง
  let retry = 0;
  while (typeof liff === 'undefined' && retry < 10) {
    await new Promise(r => setTimeout(r, 300));
    retry++;
  }

  if (typeof liff === 'undefined') {
    console.error("❌ LIFF not loaded");
    document.getElementById('liff-status').innerHTML = '❌ LIFF โหลดไม่สำเร็จ';
    return;
  }

  initLiff();
});
</script>

</body>
</html>
