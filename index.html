<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopEasy - LINE LIFF Store</title>

<!-- ✅ FIX: ใส่ defer -->
<script src="https://cdn.jsdelivr.net/npm/@line/liff@2.22.3/dist/liff.min.js" defer></script>

<style>
body{font-family:sans-serif}
</style>
</head>
<body>

<h2>🛒 ShopEasy</h2>
<div id="user">กำลังโหลด...</div>
<div id="status">⏳ ตรวจสอบ LIFF...</div>

<hr>

<button onclick="addCart()">+ เพิ่มสินค้า</button>
<div id="cart"></div>

<script>
/* ================= CONFIG ================= */
const LIFF_ID = '2009816303-JA70bVo1';
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw7wzSjgmWLxaTuBm1-4t10sYiw4-jq4yzAaetk_oO04BHE9tCbGdyOSfm1S_PIGxi6/exec';

/* ================= STATE ================= */
let cart = 0;
let lineUser = {};

/* ================= LIFF ================= */
async function initLiff() {
  const userEl = document.getElementById("user");
  const statusEl = document.getElementById("status");

  try {
    console.log("START");

    if (typeof liff === "undefined") {
      throw new Error("LIFF not loaded");
    }

    await liff.init({ liffId: LIFF_ID });
    console.log("INIT OK");

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    const profile = await liff.getProfile();
    console.log("PROFILE:", profile);

    lineUser = profile;

    userEl.innerHTML = "👤 " + profile.displayName;
    statusEl.innerHTML = "✅ LIFF READY";

  } catch (err) {
    console.error("LIFF ERROR:", err);
    statusEl.innerHTML = "❌ LIFF ERROR: " + err.message;
  }
}

/* ================= CART ================= */
function addCart() {
  cart++;
  document.getElementById("cart").innerHTML = "สินค้าในตะกร้า: " + cart;
}

/* ================= ORDER ================= */
async function submitOrder() {
  const payload = {
    orderId: 'ORD-' + Date.now(),
    lineUserId: lineUser.userId || 'demo',
    lineDisplayName: lineUser.displayName || 'demo',
    total: cart
  };

  try {
    const query = new URLSearchParams(payload).toString();
    const res = await fetch(`${SCRIPT_URL}?${query}`);
    const data = await res.json();

    console.log("RESULT:", data);

    if (data.status === "success") {
      alert("สั่งซื้อสำเร็จ");
    } else {
      throw new Error(data.message);
    }

  } catch (err) {
    console.error(err);
    alert("error: " + err.message);
  }
}

/* ================= START ================= */
window.addEventListener("load", async () => {

  // ✅ FIX: รอ liff โหลด
  let retry = 0;
  while (typeof liff === "undefined" && retry < 10) {
    console.log("⏳ waiting liff...");
    await new Promise(r => setTimeout(r, 300));
    retry++;
  }

  initLiff();
});
</script>

<button onclick="submitOrder()">สั่งซื้อ</button>

</body>
</html>
